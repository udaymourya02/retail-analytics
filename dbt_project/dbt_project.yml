name: 'retailco'
version: '1.0.0'
config-version: 2

profile: 'retailco'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  retailco:
    staging:
      +materialized: view        # staging = views (cheap, always fresh)
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table       # marts = tables (fast for dashboards)
      +schema: marts

vars:
  start_date: '2022-01-01'
  currency: 'GBP'
